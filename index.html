<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tap to Watch</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* FULLSCREEN FIX */
.container {
  position: fixed;
  inset: 0; /* lebih clean dari top/left/width/height */
  z-index: 999999;
  
  background: url('https://cdn.aceimg.com/b98554bda.jpg') center center / cover no-repeat;
}

/* Overlay */
.overlay {
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  color: white;
  cursor: pointer;
}

/* Tombol play */
.play-btn {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);

  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 20px;

  backdrop-filter: blur(5px);
}

/* Icon segitiga */
.play-btn::before {
  content: '';
  border-left: 30px solid white;
  border-top: 18px solid transparent;
  border-bottom: 18px solid transparent;
  margin-left: 5px;
}

/* Text */
.title {
  font-size: 22px;
  font-weight: bold;
}

.subtitle {
  font-size: 14px;
  opacity: 0.8;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .title {
    font-size: 18px;
  }

  .play-btn {
    width: 90px;
    height: 90px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="overlay" onclick="goLink()">

    <div class="play-btn"></div>

    <div class="title">Tap to Watch</div>
    <div class="subtitle">private clip 🔥</div>

  </div>
</div>

<script>
function goLink() {
  window.location.href = "https://t.co/5RQ8lLXMa6";
}
</script>

</body>
</html>
